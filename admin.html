<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Status Update - DJMC 35</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Admin Verification Update</h1>
        <p class="subtitle">Use tracking ID and set pending / verified / rejected.</p>

        <form id="adminForm" class="form-grid">
          <label>
            Admin Secret
            <input type="password" name="adminSecret" required />
          </label>
          <label>
            Tracking ID
            <input type="text" name="trackingId" placeholder="DJMC35-XXXXXX" required />
          </label>
          <label>
            Verification Status
            <select name="status" required>
              <option value="pending">Pending</option>
              <option value="verified">Verified</option>
              <option value="rejected">Rejected</option>
            </select>
          </label>
          <button type="submit">Update Status</button>
        </form>

        <div id="adminMessage" class="message" aria-live="polite"></div>
      </section>
    </main>

    <script src="scripts/config.js"></script>
    <script src="scripts/admin.js"></script>
  </body>
</html>
